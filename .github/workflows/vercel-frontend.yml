name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/vercel-frontend.yml
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/vercel-frontend.yml

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-frontend-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          else
            vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
          fi

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Deploy
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            url="$(vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}")"
          else
            url="$(vercel deploy --yes --token="${{ secrets.VERCEL_TOKEN }}")"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Vercel Preview: ${{ steps.deploy.outputs.url }}`
            })
