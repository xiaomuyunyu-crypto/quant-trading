# Render 免费计划 15 分钟无请求会休眠 → 定时 ping 保持热机
name: Keep Render Awake

on:
  schedule:
    # 每 10 分钟 ping 一次 Render（UTC 时间）
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -sS -m 120 -o /dev/null -w "HTTP %{http_code} | time %{time_total}s\n" \
            "https://quant-trading-pyyo.onrender.com/api/health" || true
      - name: Ping with retry on cold start
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -sS -m 45 -o /dev/null -w "%{http_code}" \
              "https://quant-trading-pyyo.onrender.com/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Attempt $i: OK"
              break
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
